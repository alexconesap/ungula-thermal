sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: PID thermal control, heater and fan manager, NTC temperature sensor.
paragraph=Portable embedded C++17 thermal control. PidController with configurable gains, HeaterChannel with adaptive duty floor, FanController<N> with tachometer support, NTC TempSensor. No internal dependencies, no platform bindings. Supported targets: ESP32, STM32 and other MCUs — pure C++, ADC/PWM are wired by the host.
